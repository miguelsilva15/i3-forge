[colors]
background = #CC1E1E20
foreground = #E8E8E8
yellow     = #FFDC32
dimmed     = #888888
urgent     = #FF5555
green      = #50FA7B
red        = #FF5555

[bar/main]
width            = 100%
height           = 28
radius           = 0
fixed-center     = true
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 2
line-color        = ${colors.yellow}
border-size      = 0
padding-left     = 1
padding-right    = 2
module-margin    = 1
font-0           = Inter:size=10;2
font-1           = Symbols Nerd Font:size=11;3
font-2           = Noto Serif:size=10;2
tray-position    = none
modules-left     = date sep spotify
modules-center   = i3
modules-right    = weather sep battery sep volume sep wlan sep tray powermenu

[module/sep]
type              = custom/text
format            = |
format-foreground = ${colors.yellow}

[module/i3]
type                       = internal/i3
format                     = <label-state> <label-mode>
index-sort                 = true
wrapping-scroll            = false
label-mode                 = %mode%
label-mode-padding         = 2
label-mode-foreground      = ${colors.yellow}
label-focused              = %index%
label-focused-background   = #33FFDC32
label-focused-underline    = ${colors.yellow}
label-focused-foreground   = ${colors.yellow}
label-focused-padding      = 2
label-unfocused            = %index%
label-unfocused-padding    = 2
label-unfocused-foreground = ${colors.dimmed}
label-visible              = %index%
label-visible-padding      = 2
label-urgent               = %index%
label-urgent-padding       = 2
label-urgent-foreground    = ${colors.urgent}

[module/spotify]
type                     = custom/script
exec                     = playerctl --player=spotify metadata --format '{{artist}} - {{title}}' 2>/dev/null || echo ""
interval                 = 2
format                   = <label>
format-prefix            = " "
format-prefix-foreground = ${colors.yellow}
label                    = %output:0:50%
label-foreground         = ${colors.foreground}

[module/date]
type       = internal/date
interval   = 1
date       = %A %d %b
time       = %H:%M
format     = <label>
label      = %date%  %time%
label-font = 3

[module/weather]
type                     = custom/script
exec                     = ~/.config/polybar/weather.sh
interval                 = 600
format                   = <label>
format-prefix            = " "
format-prefix-foreground = ${colors.yellow}
label-foreground         = ${colors.foreground}

[module/battery]
type                              = internal/battery
battery                           = BAT0
adapter                           = AC
full-at                           = 98
interval                          = 5
low-at                            = 15

; Charging: bolt icon + percentage, fixed width label
format-charging                   = <label-charging>
format-charging-prefix            = " "
format-charging-prefix-foreground = ${colors.yellow}
label-charging                    = %percentage%%
label-charging-foreground         = ${colors.yellow}
label-charging-minlen             = 4
label-charging-alignment          = right

; Discharging: ramp icon + percentage, same fixed width
format-discharging                = <ramp-capacity> <label-discharging>
label-discharging                 = %percentage%%
label-discharging-foreground      = ${colors.foreground}
label-discharging-minlen          = 4
label-discharging-alignment       = right

; Low battery
format-low                        = <ramp-capacity> <label-low>
format-low-foreground             = ${colors.red}
label-low                         = %percentage%%
label-low-foreground              = ${colors.red}
label-low-minlen                  = 4
label-low-alignment               = right

; Full
format-full-prefix                = " "
format-full-prefix-foreground     = ${colors.green}
label-full                        = Full
label-full-foreground             = ${colors.green}

ramp-capacity-0                   = ""
ramp-capacity-1                   = ""
ramp-capacity-2                   = ""
ramp-capacity-3                   = ""
ramp-capacity-4                   = ""
ramp-capacity-foreground          = ${colors.yellow}

[module/volume]
type                            = internal/pulseaudio
sink                            = alsa_output.pci-0000_00_1f.3.analog-stereo
use-ui-max                      = false
interval                        = 2
format-volume                   = <label-volume>
format-volume-prefix            = " "
format-volume-prefix-foreground = ${colors.yellow}
label-volume                    = %percentage%%
format-muted-prefix             = " "
format-muted-prefix-foreground  = ${colors.dimmed}
label-muted                     = muted
label-muted-foreground          = ${colors.dimmed}

[module/wlan]
type                                  = internal/network
interface                             = wlp0s20f3
interval                              = 3
format-connected                      = <label-connected>
format-connected-prefix               = " "
format-connected-prefix-foreground    = ${colors.yellow}
label-connected                       = %essid%
format-disconnected                   = <label-disconnected>
format-disconnected-prefix            = " "
format-disconnected-prefix-foreground = ${colors.dimmed}
label-disconnected                    = offline
label-disconnected-foreground         = ${colors.dimmed}

[module/tray]
type = internal/tray

[module/powermenu]
type              = custom/text
format            = "⏻"
format-foreground = ${colors.yellow}
click-left        = bash ~/.config/rofi/powermenu.sh &
