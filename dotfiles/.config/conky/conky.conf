conky.config = {
    -- Position & Size
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 40,
    minimum_width = 320,
    maximum_width = 320,

    -- Window behavior
    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    -- Rendering
    double_buffer = true,
    use_xft = true,
    font = 'JetBrains Mono:size=9',
    xftalpha = 0.7,
    update_interval = 2.0,
    cpu_avg_samples = 4,
    net_avg_samples = 2,

    -- Patito yellow / space vibe
    default_color = 'f5e6a3',
    color1 = 'ffe566',
    color2 = 'c8b560',
    color3 = 'e6cf4a',
    color4 = '8a7a30',
    color5 = 'ff4500',
}

conky.text = [[
${color1}SYSTEM ${color4}${hr 1}
${color2}Host:${color} ${nodename}
${color2}Uptime:${color} ${uptime}
${color2}Kernel:${color} ${kernel}
${color2}Battery:${color} ${battery_percent BAT0}% ${battery_bar 6 BAT0}
${color2}Power:${color} ${execi 10 cat /sys/class/power_supply/BAT0/status} ${execi 5 awk '{printf "%.1f W", $1/1000000}' /sys/class/power_supply/BAT0/power_now 2>/dev/null}

${color1}CPU ${color4}${hr 1}
${color2}Usage:${color} ${cpu}% ${alignr}${color3}${cpubar 6,180}
${color2}Freq:${color} ${freq_g}GHz
${color2}Threads:${color} ${threads} ${alignr}${color2}Running:${color} ${running_threads}

${color2}Core Usage:
${color} 1 ${cpubar cpu1 4,60} ${cpu cpu1}%  2 ${cpubar cpu2 4,60} ${cpu cpu2}%
${color} 3 ${cpubar cpu3 4,60} ${cpu cpu3}%  4 ${cpubar cpu4 4,60} ${cpu cpu4}%
${color} 5 ${cpubar cpu5 4,60} ${cpu cpu5}%  6 ${cpubar cpu6 4,60} ${cpu cpu6}%
${color} 7 ${cpubar cpu7 4,60} ${cpu cpu7}%  8 ${cpubar cpu8 4,60} ${cpu cpu8}%

${color1}MEMORY ${color4}${hr 1}
${color2}RAM:${color} $mem / $memmax ${alignr}${memperc}%
${color3}${membar 6}
${color2}Swap:${color} $swap / $swapmax ${alignr}${swapperc}%
${color3}${swapbar 6}

${color1}TEMPERATURES ${color4}${hr 1}
${color2}CPU Pkg:${color} ${execi 1 sensors coretemp-isa-0000 | grep 'Package' | awk '{print $4}'}
${color2}Core 0:${color} ${execi 1 sensors coretemp-isa-0000 | grep 'Core 0' | awk '{print $3}'}  ${color2}Core 1:${color} ${execi 1 sensors coretemp-isa-0000 | grep 'Core 1' | awk '{print $3}'}
${color2}Core 2:${color} ${execi 1 sensors coretemp-isa-0000 | grep 'Core 2' | awk '{print $3}'}  ${color2}Core 3:${color} ${execi 1 sensors coretemp-isa-0000 | grep 'Core 3' | awk '{print $3}'}
${color2}NVMe:${color} ${execi 5 sensors nvme-pci-0700 | grep 'Composite' | awk '{print $2}'}
${color2}WiFi:${color} ${execi 5 sensors iwlwifi_1-virtual-0 | grep 'temp1' | awk '{print $2}'}
${color2}Fan:${color} ${execi 1 sensors thinkpad-isa-0000 | grep 'fan1' | awk '{print $2 " " $3}'}

${color1}FILESYSTEM ${color4}${hr 1}
${color2}/ ${alignr}${color}${fs_used /} / ${fs_size /}
${color3}${fs_bar 6 /}
${color2}/home ${alignr}${color}${fs_used /home} / ${fs_size /home}
${color3}${fs_bar 6 /home}

${color1}TOP 10 PROCESSES ${color4}${hr 1}
${color2}Name               CPU%   MEM%${color}
${top name 1} ${top cpu 1}  ${top mem 1}
${top name 2} ${top cpu 2}  ${top mem 2}
${top name 3} ${top cpu 3}  ${top mem 3}
${top name 4} ${top cpu 4}  ${top mem 4}
${top name 5} ${top cpu 5}  ${top mem 5}
${top name 6} ${top cpu 6}  ${top mem 6}
${top name 7} ${top cpu 7}  ${top mem 7}
${top name 8} ${top cpu 8}  ${top mem 8}
${top name 9} ${top cpu 9}  ${top mem 9}
${top name 10} ${top cpu 10}  ${top mem 10}

${color1}NETWORK ${color4}${hr 1}
${color2}Down:${color} ${downspeed wlp0s20f3}/s ${alignr}${color2}Up:${color} ${upspeed wlp0s20f3}/s
${color2}Total:${color} ${totaldown wlp0s20f3} ${alignr}${totalup wlp0s20f3}

${color1}NOW PLAYING ${color4}${hr 1}
${color}${if_running spotify}${execi 5 dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.freedesktop.DBus.Properties.Get string:org.mpris.MediaPlayer2.Player string:Metadata 2>/dev/null | grep -A1 'xesam:title' | tail -1 | cut -d'"' -f2}
${color2}by ${color}${execi 5 dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.freedesktop.DBus.Properties.Get string:org.mpris.MediaPlayer2.Player string:Metadata 2>/dev/null | grep -A2 'xesam:artist' | tail -1 | cut -d'"' -f2}${else}No music playing${endif}
]]
